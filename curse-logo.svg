<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050008"/>
      <stop offset="50%" style="stop-color:#0a0018"/>
      <stop offset="100%" style="stop-color:#050010"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aa44ff"/>
      <stop offset="40%" style="stop-color:#8833ee"/>
      <stop offset="70%" style="stop-color:#7722cc"/>
      <stop offset="100%" style="stop-color:#6611aa"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bb55ff"/>
      <stop offset="50%" style="stop-color:#9933ee"/>
      <stop offset="100%" style="stop-color:#7711cc"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc66ff"/>
      <stop offset="100%" style="stop-color:#8800cc"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#9933ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9933ee;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cronaGlow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#cc66ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#cc66ff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ee88ff"/>
      <stop offset="60%" style="stop-color:#9922dd"/>
      <stop offset="100%" style="stop-color:#550088"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSub">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#550088" flood-opacity="0.4"/>
    </filter>
    <clipPath id="imgClip">
      <circle cx="780" cy="170" r="65"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bg)" rx="14"/>

  <!-- Outer border glow -->
  <rect x="10" y="10" width="880" height="320" rx="12" fill="none" stroke="#aa44ff" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="13" y="13" width="874" height="314" rx="10" fill="none" stroke="#7722cc" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Purple ambient glow behind letters -->
  <rect x="50" y="180" width="700" height="80" rx="40" fill="url(#glow)" opacity="0.5"/>

  <!-- Crona portrait — top-right corner, small badge -->
  <g transform="translate(830, 38)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#aa44ff" stroke-width="1" stroke-opacity="0.3"/>
    <clipPath id="cornerClip">
      <circle cx="0" cy="0" r="25"/>
    </clipPath>
    <image href="data:image/jpeg;base64,"
           x="-25" y="-25" width="50" height="50"
           clip-path="url(#cornerClip)" preserveAspectRatio="xMidYMid slice" opacity="0.85"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#cc66ff" stroke-width="1.5" stroke-opacity="0.35"/>
  </g>

  <!-- C U R S E letters in purple gradient -->
  <g transform="translate(0, -10)">
    <text x="60" y="100" font-family="Consolas, 'Courier New', monospace" font-size="80" font-weight="bold"
          fill="url(#accentH)" filter="url(#dropShadow)" letter-spacing="14">C</text>
    <text x="150" y="100" font-family="Consolas, 'Courier New', monospace" font-size="80" font-weight="bold"
          fill="#bb55ff" letter-spacing="14">U</text>
    <text x="240" y="100" font-family="Consolas, 'Courier New', monospace" font-size="80" font-weight="bold"
          fill="#aa44ff" letter-spacing="14">R</text>
    <text x="330" y="100" font-family="Consolas, 'Courier New', monospace" font-size="80" font-weight="bold"
          fill="#9933ee" letter-spacing="14">S</text>
    <text x="420" y="100" font-family="Consolas, 'Courier New', monospace" font-size="80" font-weight="bold"
          fill="#8822dd" letter-spacing="14">E</text>
  </g>

  <!-- Entity eye — purple variant -->
  <g filter="url(#neon)">
    <rect x="250" y="120" width="220" height="1" fill="#aa44ff" opacity="0.3"/>
    <ellipse cx="360" cy="152" rx="35" ry="20" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5"/>
    <ellipse cx="360" cy="152" rx="12" ry="14" fill="url(#pupilGlow)" opacity="0.95"/>
    <ellipse cx="355" cy="147" rx="3.5" ry="4.5" fill="#eeccff" opacity="0.5"/>
  </g>

  <!-- Subtitle beneath eye -->
  <text x="360" y="195" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#6a4a8a"
        text-anchor="middle" letter-spacing="5">COGNITIVE UNIFIED RUNTIME SYSTEM ENTITY</text>

  <!-- Divider bar -->
  <line x1="80" y1="226" x2="640" y2="226" stroke="#8833ee" stroke-width="0.5" opacity="0.25"/>

  <!-- Feature tags in purple/magenta -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#6a4a8a" text-anchor="middle">
    <text x="160" y="260" letter-spacing="2">◇ ZERO API KEYS</text>
    <text x="360" y="260" letter-spacing="2">◇ 12 ADAPTERS</text>
    <text x="560" y="260" letter-spacing="2">◇ AUTONOMOUS TUI</text>
  </g>

  <!-- Tagline at bottom -->
  <text x="360" y="290" font-family="Consolas, 'Courier New', monospace" font-size="10" fill="#4a2a6a"
        text-anchor="middle" letter-spacing="3">NO CLOUD · NO CONFIG · NO API KEYS</text>

  <!-- Corner decorations — purple -->
  <g fill="none" stroke="#aa44ff" stroke-width="1" opacity="0.12">
    <polyline points="25,35 25,55 35,55"/>
    <polyline points="875,35 875,55 865,55"/>
    <polyline points="25,305 25,285 35,285"/>
    <polyline points="875,305 875,285 865,285"/>
  </g>

  <!-- Connecting line from eye to Crona portrait -->
  <line x1="395" y1="152" x2="805" y2="50" stroke="#8833ee" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.15"/>
</svg>

