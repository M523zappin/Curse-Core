name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          ext=""
          if [ "${{ matrix.platform }}" = "windows" ]; then ext=".exe"; fi
          name="curse-${{ matrix.platform }}-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w" -o "$name" ./cmd/dashboard/

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: "curse-*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
